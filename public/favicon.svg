<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)" stroke="#1e3a8a" stroke-width="1.5"/>
  
  <!-- Football emoji with shadow for better visibility -->
  <text x="16" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="white" filter="url(#shadow)">⚽</text>
  
  <!-- Greek text "YABA" below the emoji -->
  <text x="16" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" filter="url(#shadow)">YABA</text>
</svg>
